apiVersion: apps/v1
kind: Deployment
metadata:
  name: restaurant-menu
spec:
  replicas: 2
  selector:
    matchLabels:
      app: restaurant-menu
  template:
    metadata:
      labels:
        app: restaurant-menu
    spec:
      containers:
      - name: restaurant-menu
        image: restaurant-menu:latest
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: restaurant-menu-service
spec:
  selector:
    app: restaurant-menu
  ports:
  - port: 80
    targetPort: 80
  type: LoadBalancer